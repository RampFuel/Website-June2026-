document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);

  window.addEventListener('error', function(e) {

    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {

        e.target.tagName, String(e.target.src || e.target.href || ''));

    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

        let finalBytes = bytes;

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });

        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

) format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"09507252-8b45-4845-882f-0531e8e73f1c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* =============================================\n     RAMPFUEL BRAND SYSTEM  ·  editorial redesign\n     Deep Blue  #0C1033   RampFuel Red #D40B00\n     Signal Orange #FF4900   Catalyst Purple #4E146A\n     ============================================= */\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --deep:        #0C1033;\n    --deep-low:    #080A22;   /* deeper recessed tone */\n    --deep-lift:   #0E1340;   /* lifted panel tone    */\n    --deep-lift-2: #141A52;\n    --rf-red:      #D40B00;\n    --rf-red-soft: #ff5544;\n    --orange:      #FF4900;\n    --purple:      #4E146A;\n    --purple-lite: #9b6bff;\n    --white:       #FFFFFF;\n    --ink-1:       #EEF0FA;\n    --ink-2:       #AEB4D6;   /* muted body  */\n    --ink-3:       #767CA6;   /* faint label */\n    --hair:        rgba(255,255,255,0.09);\n    --hair-soft:   rgba(255,255,255,0.05);\n    --font-head:   'Metrophobic', 'Raleway', sans-serif;\n    --font-body:   'Raleway', 'Inter', sans-serif;\n    --ease:        cubic-bezier(.22,.61,.36,1);\n  }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    font-family: var(--font-body);\n    background: var(--deep);\n    color: var(--ink-1);\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n    overflow-x: hidden;\n  }\n\n  .wrap { max-width: 1240px; margin: 0 auto; width: 100%; }\n\n  /* ── shared display type ── */\n  .display {\n    font-family: var(--font-head);\n    font-weight: 400;\n    letter-spacing: -0.02em;\n    line-height: 1.04;\n  }\n\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 14px;\n    font-size: 12px; font-weight: 700;\n    letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--rf-red-soft);\n  }\n  .eyebrow::before {\n    content: ''; width: 30px; height: 1.5px; flex-shrink: 0;\n    background: linear-gradient(90deg, var(--rf-red), transparent);\n  }\n  .eyebrow.center { justify-content: center; }\n\n  .section-title {\n    font-family: var(--font-head);\n    font-size: clamp(34px, 4vw, 56px);\n    font-weight: 400;\n    line-height: 1.06;\n    letter-spacing: -0.025em;\n    margin: 22px 0 22px;\n  }\n\n  .section-sub {\n    font-size: 17px;\n    color: var(--ink-2);\n    max-width: 540px;\n    line-height: 1.75;\n    font-weight: 400;\n  }\n\n  /* ── custom icon set (thin-line, cohesive) ── */\n  .ico { display: block; }\n  .ico svg { width: 100%; height: 100%; display: block; }\n\n  /* ===========================================================\n     NAV\n     =========================================================== */\n  nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 clamp(24px, 4vw, 56px);\n    height: 74px;\n    background: rgba(8,10,34,0.72);\n    backdrop-filter: blur(18px) saturate(140%);\n    border-bottom: 1px solid var(--hair-soft);\n  }\n  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }\n  .nav-logo-img { display: block; flex-shrink: 0; height: 34px; width: auto; }\n  .nav-wordmark-img {\n    display: block; flex-shrink: 0; height: 21px; width: auto;\n    image-rendering: -webkit-optimize-contrast;\n  }\n  .nav-links { display: flex; align-items: center; gap: 38px; list-style: none; }\n  .nav-links > li > a {\n    position: relative;\n    color: var(--ink-2);\n    text-decoration: none;\n    font-size: 12.5px; font-weight: 600;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    transition: color 0.25s var(--ease);\n  }\n  .nav-links > li > a:not(.nav-cta)::after {\n    content: ''; position: absolute; left: 0; bottom: -7px;\n    width: 100%; height: 1.5px; background: var(--rf-red);\n    transform: scaleX(0); transform-origin: left;\n    transition: transform 0.3s var(--ease);\n  }\n  .nav-links > li > a:not(.nav-cta):hover { color: var(--white); }\n  .nav-links > li > a:not(.nav-cta):hover::after { transform: scaleX(1); }\n\n  .nav-cta {\n    background: var(--rf-red);\n    color: var(--white) !important;\n    padding: 11px 22px; border-radius: 7px;\n    font-weight: 700 !important; letter-spacing: 0.04em !important;\n    box-shadow: 0 6px 20px -8px rgba(212,11,0,0.8);\n    white-space: nowrap;\n    transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), background 0.25s;\n  }\n  .nav-cta:hover { background: #b50900 !important; transform: translateY(-2px); box-shadow: 0 12px 28px -8px rgba(212,11,0,0.9); }\n\n  /* ===========================================================\n     HERO  ·  signature moment\n     =========================================================== */\n  #hero {\n    position: relative; overflow: hidden;\n    min-height: 100vh;\n    display: flex; align-items: center;\n    padding: 128px clamp(24px, 4vw, 56px) 90px;\n    background:\n      linear-gradient(180deg, var(--deep) 0%, var(--deep-low) 100%);\n  }\n  /* fine engineering grid, intentional, only on hero */\n  #hero::before {\n    content: ''; position: absolute; inset: 0; pointer-events: none;\n    background-image:\n      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);\n    background-size: 64px 64px;\n    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 30% 40%, #000 0%, transparent 75%);\n    mask-image: radial-gradient(ellipse 80% 80% at 30% 40%, #000 0%, transparent 75%);\n  }\n\n  .hero-grid {\n    position: relative; z-index: 2;\n    width: 100%; max-width: 1240px; margin: 0 auto;\n    display: grid;\n    grid-template-columns: minmax(0,1.15fr) minmax(0,0.85fr);\n    gap: 48px; align-items: center;\n  }\n\n  .hero-eyebrow { margin-bottom: 30px; }\n\n  .hero-headline {\n    font-family: var(--font-head);\n    font-size: clamp(46px, 6.4vw, 88px);\n    font-weight: 400;\n    line-height: 1.0;\n    letter-spacing: -0.035em;\n    margin-bottom: 30px;\n  }\n  .hero-headline .ln { display: block; }\n  .hero-headline .accent-red {\n    color: var(--rf-red);\n    position: relative;\n  }\n  /* underline accent on the keyword */\n  .hero-headline .accent-red::after {\n    content: ''; position: absolute; left: 2px; right: 18%; bottom: 0.04em;\n    height: 4px; border-radius: 2px;\n    background: linear-gradient(90deg, var(--rf-red), var(--orange));\n  }\n\n  .hero-sub {\n    font-size: clamp(17px, 1.5vw, 20px);\n    color: var(--ink-2);\n    max-width: 520px;\n    margin-bottom: 40px;\n    line-height: 1.7;\n  }\n\n  .hero-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }\n\n  .btn-primary {\n    display: inline-flex; align-items: center; gap: 11px;\n    background: var(--rf-red); color: var(--white);\n    padding: 16px 30px; border-radius: 9px;\n    font-weight: 700; font-size: 15px; text-decoration: none;\n    letter-spacing: 0.01em;\n    box-shadow: 0 10px 30px -10px rgba(212,11,0,0.75);\n    transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), background 0.2s;\n  }\n  .btn-primary .arr { transition: transform 0.3s var(--ease); }\n  .btn-primary:hover { background: #b50900; transform: translateY(-3px); box-shadow: 0 18px 40px -12px rgba(212,11,0,0.85); }\n  .btn-primary:hover .arr { transform: translateX(4px); }\n\n  .btn-secondary {\n    display: inline-flex; align-items: center; gap: 10px;\n    background: transparent; color: var(--white);\n    padding: 16px 28px; border-radius: 9px;\n    font-weight: 600; font-size: 15px; text-decoration: none;\n    border: 1px solid rgba(255,255,255,0.22);\n    transition: all 0.28s var(--ease);\n  }\n  .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.45); transform: translateY(-2px); }\n\n  /* signature hero visual: RAMP Report preview */\n  .hero-visual { position: relative; display: flex; justify-content: center; align-items: center; perspective: 1600px; }\n  .report-mock { position: relative; width: 100%; max-width: 420px; }\n  .report-back {\n    position: absolute; inset: 22px -20px -24px 34px; border-radius: 20px;\n    background: linear-gradient(160deg, rgba(78,20,106,0.34), rgba(212,11,0,0.10));\n    border: 1px solid rgba(155,107,255,0.18);\n    transform: rotate(4deg);\n  }\n  .report-card {\n    position: relative; z-index: 2;\n    background: linear-gradient(165deg, #141a44 0%, #0a0d29 100%);\n    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;\n    padding: 28px 28px 22px;\n    box-shadow: 0 44px 90px -34px rgba(0,0,0,0.75);\n    transform: rotateY(-9deg) rotateX(3deg);\n  }\n  @keyframes reportIn { from { transform: rotateY(-16deg) translateY(26px); } to { transform: rotateY(-9deg) rotateX(3deg); } }\n  .report-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }\n  .report-brand { display: flex; align-items: center; gap: 11px; font-family: var(--font-head); font-size: 19px; color: var(--white); letter-spacing: -0.01em; }\n  .report-brand .mk { width: 13px; height: 13px; border-radius: 4px; background: linear-gradient(135deg, var(--rf-red), var(--orange)); box-shadow: 0 0 14px rgba(255,73,0,0.55); }\n  .report-chip { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); border: 1px solid var(--hair); border-radius: 100px; padding: 4px 10px; }\n  .report-lead { font-size: 12px; color: var(--ink-3); letter-spacing: 0.02em; margin-bottom: 22px; }\n  .report-pillars { display: flex; flex-direction: column; gap: 15px; }\n  .rmrow { display: flex; align-items: flex-start; gap: 13px; opacity: 1; }\n  .rmrow:nth-child(1) { animation-delay: .55s; }\n  .rmrow:nth-child(2) { animation-delay: .68s; }\n  .rmrow:nth-child(3) { animation-delay: .81s; }\n  .rmrow:nth-child(4) { animation-delay: .94s; }\n  @keyframes rowIn { from { transform: translateX(14px); } to { transform: translateX(0); } }\n  @media (prefers-reduced-motion: no-preference) {\n    .report-card { animation: reportIn 0.9s var(--ease) both; }\n    .rmrow { animation: rowIn 0.5s var(--ease) both; }\n  }\n  .rmtag { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 12px; }\n  .rmtag.c1 { background: rgba(212,11,0,0.15); color: var(--rf-red-soft); border: 1px solid rgba(212,11,0,0.3); }\n  .rmtag.c2 { background: rgba(255,73,0,0.13); color: #ff8a5c; border: 1px solid rgba(255,73,0,0.28); }\n  .rmtag.c3 { background: rgba(120,60,200,0.16); color: var(--purple-lite); border: 1px solid rgba(120,60,200,0.34); }\n  .rmtag.c4 { background: rgba(255,255,255,0.05); color: var(--ink-1); border: 1px solid var(--hair); }\n  .rmbody { flex: 1; padding-top: 1px; }\n  .rmlabel { font-size: 13px; font-weight: 600; color: var(--ink-1); margin-bottom: 8px; }\n  .rmtext { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.07); }\n  .rmtext + .rmtext { margin-top: 6px; width: 68%; }\n  .report-foot { margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--hair); display: flex; align-items: center; gap: 11px; font-size: 11.5px; color: var(--ink-2); }\n  .report-foot .seal { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; background: rgba(212,11,0,0.16); border: 1px solid rgba(212,11,0,0.42); display: flex; align-items: center; justify-content: center; color: var(--rf-red-soft); }\n  .report-foot strong { color: var(--white); font-weight: 600; }\n\n  .hero-trust { display: flex; align-items: center; gap: 12px; margin-top: 26px; max-width: 480px; font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }\n  .hero-trust .seal { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; background: rgba(212,11,0,0.14); border: 1px solid rgba(212,11,0,0.4); display: flex; align-items: center; justify-content: center; color: var(--rf-red-soft); }\n  .hero-trust strong { color: var(--white); font-weight: 700; }\n\n  /* ===========================================================\n     STATS BAR\n     =========================================================== */\n  #stats-bar {\n    position: relative;\n    background: var(--deep-low);\n    border-top: 1px solid var(--hair);\n    border-bottom: 1px solid var(--hair);\n    padding: 38px clamp(24px, 4vw, 56px);\n  }\n  .stats-inner {\n    max-width: 1240px; margin: 0 auto;\n    display: grid; grid-template-columns: repeat(5, 1fr);\n  }\n  .stat-item {\n    display: flex; flex-direction: column; gap: 8px;\n    padding: 4px 26px; position: relative;\n  }\n  .stat-item + .stat-item::before {\n    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;\n    width: 1px; background: var(--hair);\n  }\n  .stat-num {\n    font-family: var(--font-head); font-weight: 400;\n    font-size: clamp(34px, 3.4vw, 46px); color: var(--white);\n    line-height: 1; letter-spacing: -0.03em;\n  }\n  .stat-num .stat-accent { color: var(--rf-red); }\n  .stat-label {\n    font-size: 11.5px; font-weight: 600; letter-spacing: 0.1em;\n    text-transform: uppercase; color: var(--ink-3); line-height: 1.45;\n  }\n\n  /* ===========================================================\n     SECTIONS · base\n     =========================================================== */\n  section { padding: clamp(80px, 9vw, 130px) clamp(24px, 4vw, 56px); position: relative; }\n\n  /* slim accent hairline at section tops for rhythm */\n  .rule-top {\n    position: absolute; top: 0; left: clamp(24px,4vw,56px); right: clamp(24px,4vw,56px);\n    height: 1px; background: var(--hair-soft);\n  }\n  .rule-top::before {\n    content: ''; position: absolute; top: 0; left: 0;\n    width: 64px; height: 1px; background: var(--rf-red);\n  }\n\n  /* ── card primitives ── */\n  .icon-chip {\n    border-radius: 13px;\n    display: flex; align-items: center; justify-content: center;\n    flex-shrink: 0;\n    transition: transform 0.35s var(--ease), border-color 0.35s, background 0.35s;\n  }\n  .icon-chip.red    { background: rgba(212,11,0,0.13);  border: 1px solid rgba(212,11,0,0.28); color: var(--rf-red-soft); }\n  .icon-chip.orange { background: rgba(255,73,0,0.11);  border: 1px solid rgba(255,73,0,0.26); color: #ff8a5c; }\n  .icon-chip.purple { background: rgba(120,60,200,0.14);border: 1px solid rgba(120,60,200,0.32);color: var(--purple-lite); }\n  .icon-chip.blue   { background: rgba(255,255,255,0.04);border: 1px solid var(--hair); color: var(--ink-1); }\n\n  /* ===========================================================\n     ABOUT\n     =========================================================== */\n  #about { background: var(--deep); }\n  .about-grid {\n    display: grid; grid-template-columns: 0.92fr 1.08fr; gap: clamp(48px,6vw,96px);\n    align-items: start;\n  }\n  .about-pillars { display: flex; flex-direction: column; gap: 14px; margin-top: 38px; }\n  .about-pillar {\n    display: flex; align-items: flex-start; gap: 18px;\n    padding: 22px 24px;\n    background: rgba(255,255,255,0.025);\n    border: 1px solid var(--hair);\n    border-radius: 14px;\n    transition: transform 0.35s var(--ease), background 0.35s, border-color 0.35s;\n  }\n  .about-pillar:hover { transform: translateX(6px); background: rgba(255,255,255,0.045); border-color: rgba(212,11,0,0.35); }\n  .about-pillar:hover .icon-chip { transform: scale(1.06); }\n  .about-pillar .icon-chip { width: 46px; height: 46px; }\n  .about-pillar .icon-chip .ico { width: 24px; height: 24px; }\n  .about-pillar-text strong { display: block; font-family: var(--font-head); font-size: 17px; color: var(--white); margin-bottom: 5px; letter-spacing: -0.01em; }\n  .about-pillar-text span { font-size: 14px; color: var(--ink-2); line-height: 1.6; }\n\n  .about-right { display: flex; flex-direction: column; gap: 26px; padding-top: 8px; }\n  .about-quote {\n    font-family: var(--font-head);\n    font-size: clamp(22px, 2.3vw, 31px);\n    line-height: 1.34; color: var(--white);\n    letter-spacing: -0.015em;\n    padding-left: 28px; position: relative;\n  }\n  .about-quote::before {\n    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;\n    width: 3px; border-radius: 2px;\n    background: linear-gradient(180deg, var(--rf-red), var(--purple));\n  }\n  .about-quote em { font-style: normal; color: var(--rf-red-soft); }\n  .about-body { font-size: 16px; color: var(--ink-2); line-height: 1.85; }\n  .founder-cards { display: flex; flex-direction: column; gap: 18px; }\n  .founder-card {\n    display: grid; grid-template-columns: auto 1fr; gap: 20px;\n    padding: 26px 28px;\n    background: rgba(255,255,255,0.025); border: 1px solid var(--hair); border-radius: 16px;\n    transition: transform 0.35s var(--ease), background 0.35s, border-color 0.35s;\n  }\n  .founder-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.05); border-color: rgba(212,11,0,0.32); }\n  .founder-avatar {\n    width: 70px; height: 70px; border-radius: 50%; flex-shrink: 0; overflow: hidden;\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--font-head); font-size: 20px; color: var(--white); letter-spacing: 0.02em;\n  }\n  .founder-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center 22%; display: block; transform: scale(1.16); }\n  .founder-avatar.red { backgroun =========================================================== */\n  #icp { background: var(--deep); }\n  .icp-layout { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: clamp(40px,5vw,80px); align-items: start; }\n  .icp-intro { position: sticky; top: 100px; }\n  .icp-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }\n  .icp-card {\n    display: flex; align-items: flex-start; gap: 18px;\n    padding: 24px;\n    background: rgba(255,255,255,0.025);\n    border: 1px solid var(--hair);\n    border-radius: 14px;\n    transition: transform 0.35s var(--ease), background 0.35s, border-color 0.35s;\n  }\n  .icp-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.05); border-color: rgba(212,11,0,0.32); }\n  .icp-card:hover .icon-chip { transform: scale(1.07); }\n  .icp-card.span2 { grid-column: 1 / 3; }\n  .icp-card .icon-chip { width: 48px; height: 48px; }\n  .icp-card .icon-chip .ico { width: 25px; height: 25px; }\n  .icp-card strong { display: block; font-family: var(--font-head); font-size: 17px; font-weight: 400; color: var(--white); margin-bottom: 4px; letter-spacing: -0.01em; }\n  .icp-card span { font-size: 13px; color: var(--ink-2); line-height: 1.55; }\n\n  /* ===========================================================\n     ASSESSMENT CTA  ·  signature close\n     =========================================================== */\n  #assessment {\n    background: var(--deep-low);\n    position: relative; overflow: hidden;\n    text-align: center;\n  }\n  #assessment::before {\n    content: ''; position: absolute; inset: 0; pointer-events: none;\n    background-image: repeating-linear-gradient(-52deg, transparent, transparent 78px, rgba(255,255,255,0.02) 78px, rgba(255,255,255,0.02) 79px);\n    -webkit-mask-image: radial-gradient(ellipse 70% 90% at 50% 50%, #000 0%, transparent 80%);\n    mask-image: radial-gradient(ellipse 70% 90% at 50% 50%, #000 0%, transparent 80%);\n  }\n  #assessment::after {\n    content: ''; position: absolute; top: -30%; left: 50%; transform: translateX(-50%);\n    width: 760px; height: 600px; pointer-events: none;\n    background: radial-gradient(circle, rgba(212,11,0,0.16) 0%, transparent 62%);\n  }\n  .assessment-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }\n  .assessment-badge {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-size: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--orange); margin-bottom: 28px;\n  }\n  .assessment-badge .ico { width: 16px; height: 16px; }\n  .assessment-title { font-family: var(--font-head); font-size: clamp(38px, 5vw, 64px); font-weight: 400; line-height: 1.02; letter-spacing: -0.03em; margin-bottom: 22px; }\n  .assessment-title .red { color: var(--rf-red); }\n  .assessment-sub { font-size: 18px; color: var(--ink-2); line-height: 1.7; margin-bottom: 44px; max-width: 600px; margin-left: auto; margin-right: auto; }\n\n  .pricing-block {\n    display: inline-flex; align-items: baseline; gap: 16px;\n    padding: 22px 34px; margin-bottom: 36px;\n    background: rgba(255,255,255,0.03);\n    border: 1px solid var(--hair); border-radius: 16px;\n  }\n  .price-original { font-size: 22px; color: var(--ink-3); text-decoration: line-through; }\n  .price-new { font-family: var(--font-head); font-size: clamp(52px, 6vw, 68px); font-weight: 400; color: var(--white); line-height: 1; letter-spacing: -0.03em; }\n  .price-label { font-size: 13px; color: var(--ink-2); text-align: left; line-height: 1.45; }\n\n  .assessment-perks { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 44px; }\n  .perk-tag {\n    display: inline-flex; align-items: center; gap: 9px;\n    background: rgba(255,255,255,0.035);\n    border: 1px solid var(--hair); border-radius: 100px;\n    padding: 9px 18px 9px 14px; font-size: 13px; color: var(--ink-2);\n    transition: border-color 0.3s, color 0.3s, transform 0.3s var(--ease);\n  }\n  .perk-tag:hover { border-color: rgba(212,11,0,0.4); color: var(--white); transform: translateY(-2px); }\n  .perk-tag .ico { width: 15px; height: 15px; color: var(--rf-red-soft); flex-shrink: 0; }\n\n  .scarcity-note { font-size: 13.5px; color: var(--ink-2); margin-top: 24px; }\n  .scarcity-note strong { color: var(--orange); }\n  .scarcity-note a { color: var(--orange); text-decoration: none; border-bottom: 1px solid rgba(255,73,0,0.4); }\n\n  /* ===========================================================\n     FOOTER\n     =========================================================== */\n  footer { background: var(--deep-low); border-top: 1px solid var(--hair); padding: 72px clamp(24px,4vw,56px) 40px; }\n  .footer-inner { max-width: 1240px; margin: 0 auto; }\n  .footer-top { display: grid; grid-template-columns: 1.7fr 1fr 1fr 1fr; gap: 50px; margin-bottom: 54px; }\n  .footer-brand p { font-size: 14px; color: var(--ink-2); line-height: 1.75; margin-top: 18px; max-width: 290px; }\n  .footer-tagline { font-family: var(--font-head); font-size: 13px; letter-spacing: 0.1em; color: var(--rf-red-soft); font-weight: 400; margin-top: 22px; text-transform: uppercase; }\n  .footer-col h4 { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 20px; }\n  .footer-col ul { list-style: none; }\n  .footer-col li { margin-bottom: 11px; }\n  .footer-col a { font-size: 14px; color: var(--ink-2); text-decoration: none; transition: color 0.25s, padding-left 0.25s var(--ease); }\n  .footer-col a:hover { color: var(--white); padding-left: 4px; }\n  .footer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 32px; border-top: 1px solid var(--hair); flex-wrap: wrap; gap: 12px; }\n  .footer-bottom p { font-size: 12.5px; color: var(--ink-3); }\n  .footer-bottom a { color: var(--ink-3); text-decoration: none; margin-left: 22px; font-size: 12.5px; transition: color 0.25s; }\n  .footer-bottom a:hover { color: var(--white); }\n\n  .red { color: var(--rf-red); }\n  .orange { color: var(--orange); }\n\n  /* ===========================================================\n     RESPONSIVE\n     =========================================================== */\n  @media (max-width: 1080px) {\n    .nav-links { display: none; }\n    .hero-grid { grid-template-columns: 1fr; gap: 40px; }\n    .hero-visual { order: -1; max-width: 380px; margin: 0 auto; }\n    .report-card { transform: rotateY(-5deg); }\n    .services-bento { grid-template-columns: 1fr; }\n    .svc-featured, .svc-a, .svc-b, .svc-wide { grid-column: 1; grid-row: auto; }\n    .svc-wide { display: flex; flex-direction: column; align-items: stretch; }\n    .svc-wide .service-bullets { grid-template-columns: 1fr 1fr; }\n    .outcomes-bento { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }\n    .outcome-feature, .oc-2, .oc-3, .oc-4 { grid-column: auto; grid-row: auto; }\n    .outcome-feature { grid-column: 1 / 3; }\n  }\n  @media (max-width: 880px) {\n    nav { padding: 0 20px; }\n    .nav-links { display: none; }\n    .stats-inner { grid-template-columns: repeat(2, 1fr); gap: 28px 0; }\n    .stat-item { padding: 4px 20px; }\n    .stat-item:nth-child(odd)::before { display: none; }\n    .stat-item + .stat-item::before { display: none; }\n    .stat-item:nth-child(even)::before { content: ''; display: block; }\n    .about-grid { grid-template-columns: 1fr; gap: 48px; }\n    .process-steps { grid-template-columns: 1fr; }\n    .process-steps::before { display: none; }\n    .why-grid { grid-template-columns: 1fr; gap: 48px; }\n    .guarantees-panel { position: static; }\n    .icp-layout { grid-template-columns: 1fr; gap: 40px; }\n    .icp-intro { position: static; }\n    .footer-top { grid-template-columns: 1fr 1fr; gap: 40px; }\n  }\n  @media (max-width: 560px) {\n    .stats-inner { grid-template-columns: 1fr 1fr; }\n    .icp-cards { grid-template-columns: 1fr; }\n    .icp-card.span2 { grid-column: 1; }\n    .outcomes-bento { grid-template-columns: 1fr; }\n    .outcome-feature { grid-column: 1; }\n    .svc-wide .service-bullets { grid-template-columns: 1fr; }\n    .footer-top { grid-template-columns: 1fr; }\n    .pricing-block { flex-wrap: wrap; justify-content: center; text-align: center; }\n    .price-label { text-align: center; }\n    .hero-actions { width: 100%; }\n    .hero-actions a { flex: 1; justify-content: center; }\n  }\n  @media (max-width: 880px) {\n    .rr-grid { grid-template-columns: 1fr; }\n    .fuel-plan { grid-template-columns: 1fr; text-align: left; }\n    .fuel-plan .fp-metric { text-align: left; }\n  }\n  @media (max-width: 560px) {\n    .rr-pillars { grid-template-columns: 1fr; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n\n<!-- ============================= NAV ============================= -->\n<nav>\n  <a href=\"#\" class=\"nav-logo\">\n    <img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACMAAAAoCAYAAAB0HkOaAAAEJ0lEQVR42sWYXYhVVRTH//veO4yTiulQ4PcHEqVBSZFN9eJTEQRjRVIphAUiPmlfhPgQ9VRYCEaYPtSD0QflSw8DfTzUQ0/K2JdPKUrGZKGSWTb3nvProbWH1XafufNx57bhsM85d9+9/nut/1r7v480zQaE3H3XG1CzfgCY878BAhrW7+bfNgQEoN5VQEDd+ruBAhg1QM97oF0JjV3zgVMGogU07brHA+5WeD4wIE3rC+tPAvMi6G4A2Z4AIXl+b0bD5TJnLfCnhabk6hYBPTkj4XJZMgs45niSa6WF7A/gJr+QTodnf0V40haBHgV6OpbuLo0fqgBS2ruiIlz7OsIfy4gALAXOm8FiHI+UFYAGp8UfAxHBfJrhSWnXJeBF4JskxXHgR4CFU+aPC88LbdL4URu3GrhoxssMf4aAxqTBuDRe5SYsM0DesnF91m+uAB63i82T5o+FJgALgO8qKu23QJ9lSs1l3KHM+BL4C1gfy8RUvbMYOOFW2LSJ18VwOn7VgNlu/N8GZBR4YFo1xwFaBvzo3L49utuNCY5ntxqQGOKNnUrvaGAl8DVw0HkkApnnAMVwPQUMu7RudHRfqgA5CJwDXk1Bjvf/ThXAmvPIcuCCC9/GjNdmVEZEQLOALxxRC+AXKwdh2iBsRY3xNjW34hVJDYqE3dKOI04F5G2lL3Oxz4Rsd1JTjlhq13JGPMHbnn2AXcBOoD8xXB/HQy+bZz4BeisW9p85TFY8DLzmqnfwq1zliDgCvA7c3MbNMaPWuPuQjPGHvIXAM8D3ztZjY2F1deElW+EVN/AK8KFpmV5f9itC12M8aCS/3QW8CfyW7FdN4KsxT9sK5tixo2VZ0UpAXQZWuMmvNW9cB/RUgOsDNgGfZ1Rg4e5HgdskqRFCALhDUjSGpJqkuqSzkg5I2h9CuAAskrRV0jZJSyRdlHQeGJH0s40/JWm+pMclrXb4WjZnXVIpqXDPD0o6Gj0zF3gWOG6ITwBPO3KtBF4BfmVyreX0TJl4BeAssM/mD6lre4E73fNa4G07mn with shared KPIs and shared outcomes.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"about-right\">\n      <div class=\"founder-cards\">\n        <div class=\"founder-card\">\n          <div class=\"founder-avatar red\"><img src=\"e2d7db4a-2c4d-420d-ab62-38e072bdbe26\" alt=\"Cole Knuth\"><\u002Fdiv>\n          <div class=\"founder-info\">\n            <div class=\"founder-name\">Cole Knuth<\u002Fdiv>\n            <div class=\"founder-role\">Co-Founder &amp; CEO<\u002Fdiv>\n            <p class=\"founder-bio\">A go-to-market strategist with deep expertise in growth architecture, global expansion, mergers and acquisitions, and capital raising. Cole recently joined a Texas A&amp;M University consortium building a self-regulatory framework for the managed services industry, giving RampFuel a forward-looking read on where MSP channel dynamics are heading and how vendors can position ahead of structural change.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"founder-card\">\n          <div class=\"founder-avatar purple\"><img src=\"0d497b28-8812-4afd-8a27-775142a7585f\" alt=\"Jared J. Smith\"><\u002Fdiv>\n          <div class=\"founder-info\">\n            <div class=\"founder-name\">Jared J. Smith<\u002Fdiv>\n            <div class=\"founder-role\">Co-Founder &amp; COO<\u002Fdiv>\n            <p class=\"founder-bio\">A channel GTM strategist with 8+ years inside the Pax8 ecosystem and across the channel community, helping B2B technology vendors build scalable, repeatable growth systems that convert into measurable ARR. Sales leadership, strategic partnerships, and revenue-team building are his home turf.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= SERVICES ============================= -->\n<section id=\"services\">\n  <div class=\"rule-top\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"services-head\">\n      <span class=\"eyebrow\">What We Do<\u002Fspan>\n      <h2 class=\"section-title\">Four Ways We Accelerate<br>Your Revenue Engine<\u002Fh2>\n      <p class=\"section-sub\">\n        Each service is designed to be embedded, not advisory. We own deliverables\n        alongside your team and measure success by your results, not our hours.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"services-bento\">\n\n      <!-- 01 · Strategic Alliances & Partnerships (featured) -->\n      <div class=\"service-card svc-featured\">\n        <span class=\"feature-tag\">Featured · Our Deepest Differentiator<\u002Fspan>\n        <div class=\"svc-kicker\">\n          <div class=\"icon-chip purple\"><span class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"2.6\"><\u002Fcircle><circle cx=\"5\" cy=\"5\" r=\"2\"><\u002Fcircle><circle cx=\"19\" cy=\"5\" r=\"2\"><\u002Fcircle><circle cx=\"5\" cy=\"19\" r=\"2\"><\u002Fcircle><circle cx=\"19\" cy=\"19\" r=\"2\"><\u002Fcircle><path d=\"M6.5 6.5 10.1 10.1M17.5 6.5 13.9 10.1M6.5 17.5 10.1 13.9M17.5 17.5 13.9 13.9\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan><\u002Fdiv>\n          <span class=\"svc-index\">Service <span class=\"slash\">/<\u002Fspan> 01<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"service-title\">Strategic Alliances &amp; Partnerships<\u002Fdiv>\n        <p class=\"service-desc\">\n          This is our deepest differentiator. We've built and scaled partner programs from the inside at Pax8, recruiting over 50,000 MSPs. We run three partner motions that generate revenue well beyond your direct team.\n        <\u002Fp>\n        <div class=\"svc-motions\">\n          <div class=\"m-cap\">The three partner motions we run<\u002Fdiv>\n          <div class=\"motion\">\n            <span class=\"m-no\">01<\u002Fspan>\n            <div class=\"m-body\"><strong>Marketplace &amp; Distribution<\u002Fstrong><span>Pax8, Sherweb, Ingram Micro, TD Synnex, AppDirect<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"motion\">\n            <span class=\"m-no\">02<\u002Fspan>\n            <div class=\"m-body\"><strong>Referral, Resale &amp; Co-Sell Programs<\u002Fstrong><span>Partner-sourced and partner-influenced revenue<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"motion\">\n            <span class=\"m-no\">03<\u002Fspan>\n            <div class=\"m-body\"><strong>Direct Partner Programs<\u002Fstrong><span>Programs you own and operate end to end<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 02 · Go-to-Market Strategy -->\n      <div class=\"service-card svc-a\">\n        <div class=\"svc-kicker\">\n          <div class=\"icon-chip red\"><span class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 6h6a3 3 0 0 1 0 6H9a3 3 0 0 0 0 6h7\"><\u002Fpath><circle cx=\"6\" cy=\"6\" r=\"1.8\"><\u002Fcircle><circle cx=\"18\" cy=\"18\" r=\"1.8\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fspan><\u002Fdiv>\n          <span class=\"svc-index\">Service <span class=\"slash\">/<\u002Fspan> 02<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"service-title\">Go-to-Market Strategy<\u002Fdiv>\n        <p class=\"service-desc\">\n          Data-driven, execution-ready GTM strategies tailored to your market, product, and growth goals. We don't hand you a framework; we build the playbook with you and run it.\n        <\u002Fp>\n        <ul class=\"service-bullets\">\n          <li>ICP and market segmentation<\u002Fli>\n          <li>Sales and marketing alignment<\u002Fli>\n          <li>Pricing and packaging strategy<\u002Fli>\n          <li>Growth playbook development<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- 03 · Market Expansion -->\n      <div class=\"service-card svc-b\">\n        <div class=\"svc-kicker\">\n          <div class=\"icon-chip orange\"><span class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"8.5\"><\u002Fcircle><path d=\"M3.5 12h17\"><\u002Fpath><path d=\"M12 3.5c2.6 2.3 2.6 14.7 0 17M12 3.5c-2.6 2.3-2.6 14.7 0 17\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan><\u002Fdiv>\n          <span class=\"svc-index\">Service <span class=\"slash\">/<\u002Fspan> 03<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"service-title\">Market Expansion<\u002Fdiv>\n        <p class=\"service-desc\">\n          Step-by-step planning and execution support to enter new territories, verticals, and customer segments. We've helped companies enter new markets without burning capital on trial and error.\n        <\u002Fp>\n        <ul class=\"service-bullets\">\n          <li>New market assessment and entry plans<\u002Fli>\n          <li>International and SMB expansion<\u002Fli>\n          <li>Competitive positioning<\u002Fli>\n          <li>Localization and sales enablement<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- 04 · Fractional CRO (full-width) -->\n      <div class=\"service-card svc-wide\">\n        <div class=\"svc-wide-main\">\n          <div class=\"svc-kicker\">\n            <div class=\"icon-chip blue\"><span class=\"ico\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"3.4\"><\u002Fcircle><path d=\"M5.5 20c0-3.7 3-5.8 6.5-5.8s6.5 2.1 6.5 5.8\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan><\u002Fdiv>\n            <span class=\"svc-index\">Service <span class=\"slash\">/<\u002Fspan> 04<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"service-title\">Fractional CRO &amp; Revenue Leadership<\u002Fdiv>\n          <p class=\"service-desc\">\n            Executive-level revenue and go-to-market leadership without the full-time cost. We step in at the C-suite or director level to drive growth, build high-performance teams, and establish a foundation for long-term scale.\n          <\u002Fp>\n        <\u002Fdiv>\n        <ul class=\"service-bullets\">\n          <li>Fractional CRO or VP Revenue<\u002Fli>\n          <li>Revenue team hiring and structure<\u002Fli>\n          <li>Sales process and CRM buildout<\u002Fli>\n          <li>Board-level reporting and strategy<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= RAMP REPORT ============================= -->\n<section id=\"rampreport\">\n  <div class=\"rule-top\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"rr-head\">\n      <span class=\"eyebrow\">The RAMP Report<\u002Fspan>\n      <h2 class=\"section-title\">Every Engagement Begins<br>with the RAMP Report<\u002Fh2>\n      <p class=\"section-sub\">\n        Before a single tactic, we build your RAMP Report, the strategic diagnosis that aligns your team on where growth actually comes from. It's our primary differentiator, and it rests on four pillars.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"rr-grid\">\n      <div class=\"rr-feature\">\n        <span class=\"feature-tag\">Our Primary Differentiator<\u002Fspan>\n        <div class=\"rr-seq\">Step 02 · The Diagnosis<\u002Fdiv>\n        <h3>A Clear-Eyed Read on Where Revenue Comes From Next<\u002Fh3>\n        <p>The RAMP Report replaces opinion with evidence. We diagnose your current reality, map the arena you compete in, and pinpoint the routes to revenue through <span class=\"em\">partnerships, marketplaces, and partner programs<\u002Fspan>.<\u002Fp>\n        <p>By the end, you and your team share one prioritized view of the moves that matter, the foundation every FUEL Plan is built on.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rr-pillars\">\n        <div class=\"rr-pillar\">\n          <span class=\"rr-no\">The R in RAMP<\u002Fspan>\n          <div class=\"icon-chip red\"><span class=\"rl\">R<\u002Fspan><\u002Fdiv>\n          <strong>Reality<\u002Fstrong>\n          <span>An honest baseline of your revenue motion today: where pipeline comes from and where growth is leaking.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"rr-pillar\">\n          <span class=\"rr-no\">The A in RAMP<\u002Fspan>\n          <div class=\"icon-chip orange\"><span class=\"rl\">A<\u002Fspan><\u002Fdiv>\n          <strong>Arena<\u002Fstrong>\n          <span>The competitive and ecosystem landscape you actually play in: the platforms, distributors and partners that shape how you win.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"rr-pillar\">\n          <span class=\"rr-no\">The M in RAMP<\u002Fspan>\n          <div class=\"icon-chip purple\"><span class=\"rl\">M<\u002Fspan><\u002Fdiv>\n          <strong>Mapping<\u002Fstrong>\n          <span>The specific routes to revenue through partnerships, marketplaces and partner programs, matched to your product and buyer.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"rr-pillar\">\n          <span class=\"rr-no\">The P in RAMP<\u002Fspan>\n          <div class=\"icon-chip blue\"><span class=\"rl\">P<\u002Fspan><\u002Fdiv>\n          <strong>Prioritization<\u002Fstrong>\n          <span>The 3–5 partner revenue strategies that move the needle first, sequenced for impact.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fuel-plan\">\n      <div class=\"fp-seq\">03<\u002Fdiv>\n      <div class=\"fp-body\">\n        <span class=\"fp-tag\">What Follows · The FUEL Plan<\u002Fspan>\n        <h3>A 12, 24, or 36-Month Execution Blueprint We Run With You<\u002Fh3>\n        <p>Developed only after the RAMP Report establishes strategic alignment, the FUEL Plan turns diagnosis into motion, a month-by-month blueprint we operate inside your revenue org as embedded, augmented revenue leaders, with shared KPIs and shared outcomes.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fp-metric\"><b>12–36<\u002Fb><span>Month Blueprint<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= WHY ============================= -->\n<section id=\"why\">\n  <div class=\"rule-top\"><\u002Fdiv>\n  <div class=\"wrap why-grid\">\n    <div class=\"why-left\">\n      <span class=\"eyebrow\">Why RampFuel<\u002Fspan>\n      <h2 class=\"section-title\">We've Built What<br>We're Selling You<\u002Fh2>\n      <p class=\"section-sub\">\n        Most consultants study what works. We've lived it; building channel programs, closing enterprise deals, and scaling companies from the inside at the world's leading cloud marketplaces.\n      <\u002Fp>\n      <div class=\"diff-list\">\n        <div class=\"diff-item\">\n          <div class=\"icon-chip red\"><span class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"8\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fspan><\u002Fdiv>\n          <div class=\"diff-text\">\n            <strong>Built From Inside Pax8<\u002Fstrong>\n            <p>Firsthand experience navigating the Pax8 ecosystem and the wider channel, not theory from the outside.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"diff-item\">\n          <div class=\"icon-chip orange\"><span class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19l5-5 3 3 4-6\"><\u002Fpath><path d=\"M16 8h4v4\"><\u002Fpath><path d=\"M4 4v16\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan><\u002Fdiv>\n          <div class=\"diff-text\">\n            <strong>Operators Who Scale Companies<\u002Fstrong>\n            <p>Growth architecture, global expansion, M&amp;A, and capital raising, applied to your revenue motion.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"diff-item\">\n          <div class=\"icon-chip purple\"><span class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"2.6\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fspan><\u002Fdiv>\n          <div class=\"diff-text\">\n            <strong>A Forward-Looking Channel View<\u002Fstrong>\n            <p>Active MSP industry and self-regulation research (Texas A&amp;M) means we position you ahead of where the channel is going, not where it was.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"diff-item\">\n          <div class=\"icon-chip blue\"><span class=\"ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"8\" r=\"3\"><\u002Fcircle><path d=\"M3.5 19c0-3 2.5-4.8 5.5-4.8s5.5 1.8 5.5 4.8\"><\u002Fpath><path d=\"M16.5 6.4a3 3 0 0 1 0 5.2M18 14.4c2.1.5 3.5 1.9 3.5 4.2\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan><\u002Fdiv>\n          <div class=\"diff-text\">\n            <strong>Revenue Teams That Last<\u002Fstrong>\n            <p>We architect and build the high-performance revenue teams and systems, then hand you something you own.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"guarantees-panel\">\n        <span class=\"eyebrow\">O
